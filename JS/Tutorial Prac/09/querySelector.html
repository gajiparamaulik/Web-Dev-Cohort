<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Query Selector</title>
</head>
<body>
    <h2>Dom Query Selector</h2>

    <nav>
        <h4>Hey There, I am a Developer.!</h4>
    </nav>
    <div class="test-class">
        <h5>Testing DOM</h5>
        <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Quos eius quas dignissimos consequuntur. M
            ollitia, animi.
        </p>
        <pre>Console.log('console');</pre>
    </div>

    <script>
        const ele = document.querySelector('.test-class');
        console.log(ele);
    </script>
</body>
</html>
